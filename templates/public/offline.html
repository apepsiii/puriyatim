<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#10b981">
    <title>Tidak Ada Koneksi - Puri Yatim</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: '#10b981', primary_dark: '#059669' } } }
        }
    </script>
    <style>
        @keyframes bounce-slow {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }
        .bounce-slow { animation: bounce-slow 2s ease-in-out infinite; }
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }
        .pulse-ring::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 3px solid #10b981;
            animation: pulse-ring 1.5s ease-out infinite;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col items-center justify-center px-4">

    <div class="text-center max-w-md mx-auto">
        <!-- Icon animasi -->
        <div class="relative inline-flex items-center justify-center mb-8">
            <div class="pulse-ring relative w-28 h-28 bg-white rounded-full shadow-lg flex items-center justify-center bounce-slow">
                <svg class="w-14 h-14 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                          d="M18.364 5.636a9 9 0 010 12.728M15.536 8.464a5 5 0 010 7.072M5.636 5.636a9 9 0 000 12.728M8.464 8.464a5 5 0 000 7.072M12 12h.01"/>
                </svg>
            </div>
        </div>

        <!-- Pesan -->
        <h1 class="text-2xl font-bold text-gray-800 mb-3">Tidak Ada Koneksi</h1>
        <p class="text-gray-500 mb-2">Anda sedang offline. Silakan periksa koneksi internet Anda.</p>
        <p class="text-sm text-gray-400 mb-8">Beberapa halaman mungkin masih dapat diakses dari cache.</p>

        <!-- Tombol -->
        <div class="space-y-3">
            <button onclick="window.location.reload()"
                    class="w-full bg-primary hover:bg-primary_dark text-white font-semibold py-3 px-6 rounded-xl transition-colors duration-200 flex items-center justify-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                </svg>
                Coba Lagi
            </button>
            <a href="/"
               class="w-full border border-gray-200 bg-white hover:bg-gray-50 text-gray-700 font-semibold py-3 px-6 rounded-xl transition-colors duration-200 flex items-center justify-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                </svg>
                Kembali ke Beranda
            </a>
        </div>

        <!-- Logo -->
        <div class="mt-12 flex items-center justify-center gap-2 text-gray-400">
            <div class="w-6 h-6 bg-primary rounded-md flex items-center justify-center">
                <svg class="w-4 h-4 text-white" fill="currentColor" viewBox="0 0 20 20">
                    <path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/>
                </svg>
            </div>
            <span class="text-sm font-medium">Puri Yatim</span>
        </div>
    </div>

    <script>
        // Auto-reload saat koneksi kembali
        window.addEventListener('online', function() {
            window.location.reload();
        });
    </script>
</body>
</html>
