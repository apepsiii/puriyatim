{{define "public/program_donasi.html"}}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Program Donasi - Puri Yatim</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }</style>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: '#10b981', primary_light: '#d1fae5', primary_dark: '#059669' } } }
        }
    </script>
</head>
<body class="flex justify-center min-h-screen">
    <div class="w-full max-w-md bg-white min-h-screen relative shadow-2xl overflow-x-hidden pb-28">
        <header class="pt-6 px-5 pb-4 bg-white sticky top-0 z-30 border-b border-gray-100 flex items-center gap-4">
            <a href="/" class="w-9 h-9 flex items-center justify-center rounded-full bg-gray-50 text-gray-700 hover:bg-gray-100 transition-colors">
                <i class="fas fa-chevron-left text-sm"></i>
            </a>
            <div>
                <h1 class="text-lg font-bold text-gray-900">Program Donasi</h1>
                <p class="text-xs text-gray-500">Langkah 1 dari 2</p>
            </div>
        </header>

        <main class="px-5 pt-5">
            <div class="bg-gradient-to-br from-emerald-50 to-teal-100 border border-emerald-100 rounded-2xl p-4 mb-5">
                <p class="text-sm font-semibold text-emerald-800">Donasi Amanah & Transparan</p>
                <p class="text-xs text-emerald-700 mt-1">Setelah isi form, Anda akan diarahkan ke halaman konfirmasi transfer dan upload bukti transfer.</p>
            </div>

            <form id="programDonasiForm" class="space-y-5">
                <div class="bg-white rounded-2xl border border-gray-100 p-4">
                    <label class="block text-sm font-bold text-gray-900 mb-2">Pilih Program <span class="text-red-500">*</span></label>
                    <div class="grid grid-cols-1 gap-2">
                        {{range .Programs}}
                        <label class="flex items-start gap-3 p-3 border border-gray-200 rounded-xl has-[:checked]:border-emerald-500 has-[:checked]:bg-emerald-50 cursor-pointer">
                            <input type="radio" name="program" value="{{.key}}" class="mt-1 w-4 h-4 text-emerald-600 border-gray-300 focus:ring-emerald-500" required>
                            <div>
                                <p class="text-sm font-semibold text-gray-900">{{.label}}</p>
                                <p class="text-xs text-gray-500">{{.desc}}</p>
                            </div>
                        </label>
                        {{end}}
                    </div>
                </div>

                <div class="bg-white rounded-2xl border border-gray-100 p-4 space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Nama Donatur <span class="text-red-500">*</span></label>
                        <input type="text" name="nama" required placeholder="Masukkan nama donatur" class="w-full rounded-xl border border-gray-300 bg-gray-50 px-3 py-2.5 text-sm outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Nomor HP <span class="text-red-500">*</span></label>
                        <input type="text" name="nomor_hp" required placeholder="08xxxxxxxxxx" class="w-full rounded-xl border border-gray-300 bg-gray-50 px-3 py-2.5 text-sm outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-900 mb-1">Jumlah Donasi <span class="text-red-500">*</span></label>
                        <div class="relative">
                            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 font-semibold">Rp</span>
                            <input type="text" name="nominal" id="nominal" required placeholder="0" class="w-full rounded-xl border border-gray-300 bg-gray-50 pl-10 pr-3 py-2.5 text-right text-lg font-bold text-emerald-700 outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Metode Transfer</label>
                        <select name="metode" class="w-full rounded-xl border border-gray-300 bg-gray-50 px-3 py-2.5 text-sm outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100">
                            <option value="Transfer Bank">Transfer Bank</option>
                            <option value="QRIS">QRIS</option>
                        </select>
                    </div>
                </div>
            </form>
        </main>

        <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t border-gray-100 p-4 rounded-t-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.05)] z-40">
            <button id="submitBtn" type="submit" form="programDonasiForm" class="w-full bg-primary hover:bg-primary_dark text-white font-bold py-4 px-4 rounded-2xl shadow-lg shadow-emerald-200 transition-all flex items-center justify-center gap-2">
                <i class="fas fa-arrow-right"></i>
                <span>Lanjut Konfirmasi</span>
            </button>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'programDonasiDraft';

        function formatNominal(input) {
            let value = input.value.replace(/\D/g, '');
            input.value = value ? parseInt(value, 10).toLocaleString('id-ID') : '';
        }
        document.getElementById('nominal').addEventListener('input', function () { formatNominal(this); });

        function saveDraft(data) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function loadDraft() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) return;
                const data = JSON.parse(raw);
                if (data.nama) document.querySelector('[name="nama"]').value = data.nama;
                if (data.nomor_hp) document.querySelector('[name="nomor_hp"]').value = data.nomor_hp;
                if (data.nominal) document.querySelector('[name="nominal"]').value = data.nominal;
                if (data.metode) document.querySelector('[name="metode"]').value = data.metode;
                if (data.program) {
                    const radio = document.querySelector('[name="program"][value="' + data.program + '"]');
                    if (radio) radio.checked = true;
                }
            } catch (e) {}
        }

        loadDraft();

        document.getElementById('programDonasiForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const form = e.target;
            const program = form.querySelector('[name="program"]:checked');
            const nama = form.querySelector('[name="nama"]').value.trim();
            const nomorHP = form.querySelector('[name="nomor_hp"]').value.trim();
            const nominal = form.querySelector('[name="nominal"]').value.trim();
            const metode = form.querySelector('[name="metode"]').value;

            if (!program || !nama || !nomorHP || !nominal) {
                Swal.fire({ icon: 'warning', title: 'Lengkapi Data', text: 'Program, nama, nomor HP, dan jumlah donasi wajib diisi.' });
                return;
            }

            saveDraft({
                program: program.value,
                nama: nama,
                nomor_hp: nomorHP,
                nominal: nominal,
                metode: metode,
                updated_at: Date.now()
            });
            window.location.href = '/program-donasi/konfirmasi';
        });
    </script>
</body>
</html>
{{end}}
