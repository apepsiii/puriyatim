{{define "public/galeri.html"}}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Galeri - Puri Yatim</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }</style>
</head>
<body class="flex justify-center min-h-screen">
    <div class="w-full max-w-md bg-white min-h-screen relative shadow-2xl overflow-x-hidden pb-24">
        <header class="pt-6 px-5 pb-4 bg-white sticky top-0 z-30 border-b border-gray-100 flex items-center gap-4">
            <a href="/" class="w-9 h-9 flex items-center justify-center rounded-full bg-gray-50 text-gray-700 hover:bg-gray-100 transition-colors">
                <i class="fas fa-chevron-left text-sm"></i>
            </a>
            <div>
                <h1 class="text-lg font-bold text-gray-900">Galeri Kegiatan</h1>
                <p class="text-xs text-gray-500">Dokumentasi kegiatan Puri Yatim</p>
            </div>
        </header>

        <main class="px-5 pt-5">
            <div class="grid grid-cols-1 gap-4">
                {{range .Items}}
                <article class="bg-white rounded-2xl border border-gray-100 overflow-hidden shadow-sm">
                    <img src="{{.gambar_url | safeImageURL}}" alt="{{.judul}}" class="w-full h-56 object-cover">
                    <div class="p-4">
                        <h2 class="font-semibold text-gray-900 text-base">{{.judul}}</h2>
                        <p class="text-sm text-gray-600 mt-1">{{.deskripsi}}</p>
                    </div>
                </article>
                {{else}}
                <div class="bg-gray-50 rounded-2xl p-8 text-center text-gray-500 border border-dashed border-gray-300">
                    Belum ada foto galeri
                </div>
                {{end}}
            </div>
        </main>
    </div>
</body>
</html>
{{end}}
